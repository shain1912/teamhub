<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>TeamKode</title>
    <meta name="description" content="팀 협업 워크스페이스 — 메신저·티켓·간트·체크리스트" />
    <!-- PWA / 아이콘 -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#b7004f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TeamKode" />
    <!-- 테마 무플래시: React 마운트 전에 .dark 적용 -->
    <script>
      (function () {
        try {
          // 디폴트 라이트 — 사용자가 명시적으로 다크를 선택(localStorage)한 경우만 다크
          if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
