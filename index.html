<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeamKode</title>
    <!-- 테마 무플래시: React 마운트 전에 .dark 적용 -->
    <script>
      (function () {
        try {
          // 디폴트 라이트 — 사용자가 명시적으로 다크를 선택(localStorage)한 경우만 다크
          if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
